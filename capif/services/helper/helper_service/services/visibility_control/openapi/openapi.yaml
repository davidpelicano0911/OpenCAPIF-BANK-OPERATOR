openapi: 3.0.3
info:
  description: |
    Visibility control API manages visibility rules and evaluate decisions for API discovery and
    security-context access within OpenCAPIF. This API controls whether APIs are visible to invokers
    (discovery) and whether invokers are allowed to create a security context to access them.
    - Rules are global and evaluated with "more specific wins" precedence.
    - If no rule matches, the decision uses OpenCAPIF's global default (outside this API).
    - Provider selector is mandatory in rules and must contain at least one selector field (userName is mandatory).
  title: OpenCAPIF Visibility Control
  version: 1.0.0
# servers:
# - description: Production
#   url: https://capif.example.com/access-control
# - description: Sandbox
#   url: https://sandbox.capif.example.com/access-control
servers:
- url: "{apiRoot}/visibility-control"
  variables:
    apiRoot:
      default: http://localhost:8080
      description: Base URL of the Helper service.
tags:
- description: Manage visibility rules
  name: Rules
- description: Evaluate discovery and access decisions
  name: Decision
paths:
  /decision/invokers/{apiInvokerId}/discoverable-apis:
    get:
      description: |
        Returns a filtered list of APIs for the API Invoker.
      operationId: decision_invokers_api_invoker_id_discoverable_apis_get
      parameters:
      - description: CAPIF API Invoker identifier
        explode: false
        in: path
        name: apiInvokerId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveredAPIs'
          description: Discover filter
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invoker not found (optional behavior)
      summary: Get discoverable APIs filter for an invoker (global scope)
      tags:
      - Decision
      x-openapi-router-controller: visibility_control.controllers.decision_controller
  /rules:
    get:
      operationId: rules_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_rules_get_200_response'
          description: List of rules
      summary: List rules
      tags:
      - Rules
      x-openapi-router-controller: visibility_control.controllers.rules_controller
    post:
      description: Server generates the ruleId. Provider selector must include at
        least one field.
      operationId: rules_post
      requestBody:
        content:
          application/json:
            examples:
              allow_except_some_invokers:
                value:
                  providerSelector:
                    userName: userA
                    apiProviderId:
                    - capif-prov-01
                    - capif-prov-02
                    apiName:
                    - apiName-001
                    apiId:
                    - apiId-001
                    aefId:
                    - aef-001
                  invokerExceptions:
                    apiInvokerId:
                    - invk-123
                    - invk-999
                  default_access: ALLOW
                  enabled: true
            schema:
              $ref: '#/components/schemas/RuleCreateRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
          description: Rule created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input
      summary: Create a rule
      tags:
      - Rules
      x-openapi-router-controller: visibility_control.controllers.rules_controller
  /rules/{ruleId}:
    delete:
      operationId: rules_rule_id_delete
      parameters:
      - description: Server-generated rule identifier
        explode: false
        in: path
        name: ruleId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Deleted
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rule not found
      summary: Delete a rule
      tags:
      - Rules
      x-openapi-router-controller: visibility_control.controllers.rules_controller
    get:
      operationId: rules_rule_id_get
      parameters:
      - description: Server-generated rule identifier
        explode: false
        in: path
        name: ruleId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
          description: Rule
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rule not found
      summary: Get a rule
      tags:
      - Rules
      x-openapi-router-controller: visibility_control.controllers.rules_controller
    patch:
      operationId: rules_rule_id_patch
      parameters:
      - description: Server-generated rule identifier
        explode: false
        in: path
        name: ruleId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RulePatchRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
          description: Rule updated
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rule not found
      summary: Update a rule (partial)
      tags:
      - Rules
      x-openapi-router-controller: visibility_control.controllers.rules_controller
