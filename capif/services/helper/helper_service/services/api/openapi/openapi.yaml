openapi: 3.0.1
info:
  description: |
    CAPIF Helper API for browsing CAPIF runtime data: invokers, providers, services,
    security bindings, and subscriptions/events. This is an internal helper interface.
  title: Helper API
  version: 1.0.0
servers:
- url: "{apiRoot}/api"
  variables:
    apiRoot:
      default: http://localhost:8080
      description: Base URL of the Helper service.
paths:
  /deleteEntities/{uuid}:
    delete:
      description: "Deletes all CAPIF entities (invokers, providers, services, security\
        \ contexts, events) associated with the given UUID."
      operationId: helper_controller_delete_entities
      parameters:
      - description: UUID of the user whose entities are to be deleted.
        explode: false
        in: path
        name: uuid
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Entities deleted successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Generic error response.
      summary: Delete entities by UUID
      x-openapi-router-controller: api.controllers.default_controller
  /getCcfId:
    get:
      description: Retrieves the CCF ID of the CAPIF Core Function.
      operationId: helper_controller_get_ccf_id
      responses:
        "200":
          description: CCF ID retrieved successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Generic error response.
      summary: Get CCF ID
      x-openapi-router-controller: api.controllers.default_controller
  /getEvents:
    get:
      description: Returns CAPIF event subscriptions or delivered events.
      operationId: helper_controller_get_events
      parameters:
      - description: Filter by subscriber identifier.
        explode: true
        in: query
        name: subscriber_id
        required: false
        schema:
          type: string
        style: form
      - description: Filter by subscription identifier.
        explode: true
        in: query
        name: subscription_id
        required: false
        schema:
          type: string
        style: form
      - description: Page size.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          minimum: 1
          type: integer
        style: form
      - description: Page index (0-based).
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseEvent'
          description: Paged list of events.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Generic error response.
      summary: Retrieve CAPIF events
      x-openapi-router-controller: api.controllers.default_controller
  /getInvokers:
    get:
      description: Returns invoker entries with pagination and optional filters.
      operationId: helper_controller_get_invokers
      parameters:
      - description: Filter by invoker UUID.
        explode: true
        in: query
        name: uuid
        required: false
        schema:
          type: string
        style: form
      - description: Filter by CAPIF `apiInvokerId`.
        explode: true
        in: query
        name: api_invoker_id
        required: false
        schema:
          type: string
        style: form
      - description: Page size.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          minimum: 1
          type: integer
        style: form
      - description: Page index (0-based).
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      - description: Sort direction.
        explode: true
        in: query
        name: sort_order
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseInvoker'
          description: Paged list of invokers.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Generic error response.
      summary: Retrieve API invokers
      x-openapi-router-controller: api.controllers.default_controller
  /getProviders:
    get:
      description: Returns provider domains (CAPIF provider domains / AEF providers)
        with pagination.
      operationId: helper_controller_get_providers
      parameters:
      - description: Filter by provider UUID.
        explode: true
        in: query
        name: uuid
        required: false
        schema:
          type: string
        style: form
      - description: Filter by provider domain ID.
        explode: true
        in: query
        name: api_prov_dom_id
        required: false
        schema:
          type: string
        style: form
      - description: Page size.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          minimum: 1
          type: integer
        style: form
      - description: Page index (0-based).
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      - description: Sort direction.
        explode: true
        in: query
        name: sort_order
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseProvider'
          description: Paged list of providers.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Generic error response.
      summary: Retrieve providers
      x-openapi-router-controller: api.controllers.default_controller
  /getSecurity:
    get:
      description: Returns security credentials/bindings for a given invoker.
      operationId: helper_controller_get_security
      parameters:
      - description: Filter by invoker identifier.
        explode: true
        in: query
        name: invoker_id
        required: false
        schema:
          type: string
        style: form
      - description: Page size.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          minimum: 1
          type: integer
        style: form
      - description: Page index (0-based).
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseSecurity'
          description: Paged list of security entries.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Generic error response.
      summary: Retrieve security associations
      x-openapi-router-controller: api.controllers.default_controller
  /getServices:
    get:
      description: Returns published APIs/services exposed by providers.
      operationId: helper_controller_get_services
      parameters:
      - description: Filter by service identifier.
        explode: true
        in: query
        name: service_id
        required: false
        schema:
          type: string
        style: form
      - description: Filter by APF identifier.
        explode: true
        in: query
        name: apf_id
        required: false
        schema:
          type: string
        style: form
      - description: Filter by API name.
        explode: true
        in: query
        name: api_name
        required: false
        schema:
          type: string
        style: form
      - description: Page size.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          minimum: 1
          type: integer
        style: form
      - description: Page index (0-based).
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      - description: Sort direction.
        explode: true
        in: query
        name: sort_order
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
        style: form
      responses:
        "200":
          content:
