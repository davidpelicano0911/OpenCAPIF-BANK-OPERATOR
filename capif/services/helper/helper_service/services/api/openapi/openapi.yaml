      description: Generic error response.
  schemas:
    ErrorResponse:
      description: Generic error payload.
      example:
        details: details
        message: message
      properties:
        message:
          title: message
          type: string
        details:
          title: details
          type: string
      title: ErrorResponse
      type: object
    PaginatedResponseBase:
      description: Common pagination envelope.
      properties:
        total:
          description: Total number of resources in CAPIF.
          example: 42
          title: total
          type: integer
        long:
          description: Total number of resources that match the given parameters
          example: 0
          title: long
          type: integer
        totalPages:
          description: Total number of pages given page size.
          example: 20
          title: totalPages
          type: integer
        sort_order:
          description: Sorting by creation date of the resources (ascending or descending).
          enum:
          - asc
          - desc
          example: asc
          title: sort_order
          type: string
      title: PaginatedResponseBase
      type: object
