openapi: 3.0.0
info:
  description: "API for Routing information.  \n© 2025, 3GPP Organizational Partners\
    \ (ARIB, ATIS, CCSA, ETSI, TSDSI, TTA, TTC).  \nAll rights reserved.\n"
  title: CAPIF_Open_Discover_Service_API
  version: 1.0.0-alpha.1
externalDocs:
  description: 3GPP TS 29.222 V19.4.0 Common API Framework for 3GPP Northbound APIs
  url: https://www.3gpp.org/ftp/Specs/archive/29_series/29.222/
servers:
- url: "{apiRoot}/open-api-disc/v1"
  variables:
    apiRoot:
      default: https://example.com
      description: apiRoot as defined in clause 7.5 of 3GPP TS 29.222.
paths:
  /service-apis:
    get:
      description: |
        Enables Open discovery of the currently registered at the CCF and satisfying  a number of filter criteria.
      operationId: service_apis_get
      parameters:
      - description: |
          Contains the name(s) of the target Service API(s).
        explode: false
        in: query
        name: api-names
        required: false
        schema:
          items:
            type: string
          minItems: 1
          type: array
        style: form
      - description: |
          Contains the major version(s) (e.g., v1) of the target Service API(s).
        explode: true
        in: query
        name: api-versions
        required: false
        schema:
          additionalProperties:
            items:
              type: string
            minItems: 1
            type: array
          minProperties: 1
          type: object
        style: form
      - description: |
          Contains the communication type supported by the target Service API(s).
        explode: true
        in: query
        name: comm-type
        required: false
        schema:
          $ref: '#/components/schemas/CommunicationType'
        style: form
      - description: "Contains the protocol(s) supported by the target Service API(s).\
          \ \n"
        explode: false
        in: query
        name: protocols
        required: false
        schema:
          items:
            type: string
          minItems: 1
          type: array
        style: form
      - description: "Contains data format(s) supported by the target Service API(s).\
          \ \n"
        explode: true
        in: query
        name: data-format
        required: false
        schema:
          $ref: '#/components/schemas/DataFormat'
        style: form
      - description: |
          Contains the category(ies) of the target Service API(s).
        explode: false
        in: query
        name: api-cats
        required: false
        schema:
          items:
            type: string
          minItems: 1
          type: array
        style: form
      - content:
          application/json:
            schema:
              $ref: '#/components/schemas/AefLocation'
        description: |
          Contains the preferred location information for AEF(s) exposing the target  Service API(s). This query parameter is ignored by the CCF if there are no matching records at the CCF.
        in: query
        name: preferred-aef-loc
        required: false
      - description: |
          Contains the name(s) of the provider(s) of the target Service API(s).
        explode: false
        in: query
        name: api-prov-names
        required: false
        schema:
          items:
            type: string
          minItems: 1
          type: array
        style: form
      - description: |
          Contains the features supported by the discovered service API indicated by  api-name parameter. This may only be present if api-name query parameter is present.
        explode: true
        in: query
        name: api-supported-features
        required: false
        schema:
          additionalProperties:
            $ref: '#/components/schemas/SupportedFeatures'
          minProperties: 1
          type: object
        style: form
      - description: |
          Contains the identifier(s) of the targeted service APIs.
        explode: false
        in: query
        name: api-ids
        required: false
        schema:
          items:
            type: string
          minItems: 1
          type: array
        style: form
      - description: "Contains iInformation about service characteristics provided\
          \ by the targeted  service API(s). \n"
        explode: true
        in: query
        name: service-kpis
        required: false
        schema:
          $ref: '#/components/schemas/ServiceKpis'
        style: form
      - description: |
          Contains the list of supported API resource(s) and service operation(s).
        explode: false
        in: query
        name: res-ops
        required: false
        schema:
          items:
            $ref: '#/components/schemas/ResOperInfo'
          minItems: 1
          type: array
        style: form
      - description: |
          Contains a list of supported features among the ones defined in clause 8.1.6. This  attributed shall be present only when feature negotiation needs to take place.
        explode: true
        in: query
        name: supported-features
        required: false
        schema:
          $ref: '#/components/schemas/SupportedFeatures'
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenDiscoveryResp'
          description: |
            The response body contains the result of the search over the list of the registered APIs.
        "307":
          description: Temporary Redirect
          headers:
            Location:
              description: An alternative URI of the resource.
              required: true
              schema:
                type: string
        "308":
          description: Permanent Redirect
          headers:
            Location:
              description: An alternative URI of the resource.
              required: true
              schema:
                type: string
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Forbidden
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "406":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Acceptable
        "414":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: URI Too Long
        "429":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Service Unavailable
        default:
          description: Generic Error
      x-openapi-router-controller: openapi_server.controllers.default_controller
