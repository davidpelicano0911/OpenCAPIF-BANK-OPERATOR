worker_processes  auto;

error_log  /var/log/nginx/error.log ${LOG_LEVEL};

pid        /tmp/nginx.pid;

events {
    worker_connections   1024;
}

http {
        map  $ssl_client_s_dn  $ssl_client_s_dn_cn {
          default "";
          ~(^|,)CN=(?<CN>[^,]+) $CN;
        }
        include maps/*.conf;
        include policies/*.conf;
        include endpoints/*.conf;

        # log_format debug_map uses custom variables only available in nginx-ocf-patched image
        # log_format debug_map 'Policy: $uri - $endpoint:$method:$role"$service:$has_token:$has_cert:$active_policy:$auth_allowed:$ssl_client_s_dn_cn';

        server {
              listen      8080;

              # access_log /var/log/nginx/access_debug.log debug_map;

              location /test {
                add_header Content-Type 'application/json';
                return 200  '{ "message": "Endpoint for testing purpouse" }';
              }

        }

        server {
              listen      443 ssl;
              # server_name capifcore;
              # server_name openshift.evolved-5g.eu;

              ssl_certificate      /etc/nginx/certs/server.crt;
              ssl_certificate_key  /etc/nginx/certs/server.key;
              ssl_client_certificate  /etc/nginx/certs/ca.crt;
              ssl_verify_client       optional;
              ssl_verify_depth        2;
              ssl_session_tickets off;

              # (ONLY DEVELOPMENT)Send the log directly to the console (useful in Docker or terminal)
              # access_log /dev/stdout debug_map;

              location ~^/(?<service_forwarding>[^/]+)(?:/(?<sub_api>[^/]+))?/(ui|openapi\.json|swagger\.json) {
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                proxy_pass http://$service_forwarding:8080;
              }

              location /api-invoker-management {
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
                proxy_pass http://api-invoker-management:8080;
              }

              location /api-provider-management {
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
                proxy_pass http://api-provider-management:8080;
              }

              location /service-apis {
                if ($ssl_client_verify != SUCCESS) {
                    return 403;
                }
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
                proxy_pass http://service-apis:8080;
              }

              location /open-api-disc {
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_pass http://open-api-disc:8080;
              }

              location /published-apis {
                if ($ssl_client_verify != SUCCESS) {
                    return 403;
                }
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
                proxy_pass http://published-apis:8080;
              }

              location /api-invocation-logs {
                if ($ssl_client_verify != SUCCESS) {
                    return 403;
                }
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
                proxy_pass http://api-invocation-logs:8080;
              }

              location /logs {
                if ($ssl_client_verify != SUCCESS) {
                    return 403;
                }
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
                proxy_pass http://logs:8080;
              }

              location /capif-security {
                if ($ssl_client_verify != SUCCESS) {
                    return 403;
                }
                if ($auth_allowed = 0) {
                add_header Content-Type 'application/problem+json';
                return 401 $auth_error;
                }

                proxy_set_header X-TLS-Protocol $ssl_protocol;
                proxy_set_header X-TLS-Session-ID $ssl_session_id;
                #proxy_set_header X-TLS-MKey $sslkeylog_mk;

                proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
                proxy_pass http://capif-security:8080;
              }

              location /capif-events {
                if ($ssl_client_verify != SUCCESS) {
                    return 403;
                }
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
                proxy_pass http://capif-events:8080;
              }

              location /access-control-policy {
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
                proxy_pass http://access-control-policy:8080;
              }

              location /helper {
                if ($auth_allowed = 0) {
                  add_header Content-Type 'application/problem+json';
                  return 401 $auth_error;
                }
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Ssl-Client-Cert $ssl_client_cert;
                proxy_pass http://helper:8080;
              }

        }
}

daemon off;
