    GeographicArea:
      anyOf:
      - $ref: '#/components/schemas/Point'
      - $ref: '#/components/schemas/PointUncertaintyCircle'
      - $ref: '#/components/schemas/PointUncertaintyEllipse'
      - $ref: '#/components/schemas/Polygon'
      - $ref: '#/components/schemas/PointAltitude'
      - $ref: '#/components/schemas/PointAltitudeUncertainty'
      - $ref: '#/components/schemas/EllipsoidArc'
      description: Geographic area specified by different shape.
      title: GeographicArea
    Point:
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
        required:
        - point
        type: object
      description: Ellipsoid Point.
      example:
        shape: POINT
        point:
          lon: 36.988422590534526
          lat: -63.615366350946985
      title: Point
    GADShape:
      description: Common base type for GAD shapes.
      discriminator:
        mapping:
          POINT: '#/components/schemas/Point'
          POINT_UNCERTAINTY_CIRCLE: '#/components/schemas/PointUncertaintyCircle'
          POINT_UNCERTAINTY_ELLIPSE: '#/components/schemas/PointUncertaintyEllipse'
          POLYGON: '#/components/schemas/Polygon'
          POINT_ALTITUDE: '#/components/schemas/PointAltitude'
          POINT_ALTITUDE_UNCERTAINTY: '#/components/schemas/PointAltitudeUncertainty'
          ELLIPSOID_ARC: '#/components/schemas/EllipsoidArc'
          LOCAL_2D_POINT_UNCERTAINTY_ELLIPSE: '#/components/schemas/Local2dPointUncertaintyEllipse'
          LOCAL_3D_POINT_UNCERTAINTY_ELLIPSOID: '#/components/schemas/Local3dPointUncertaintyEllipsoid'
        propertyName: shape
      properties:
        shape:
          $ref: '#/components/schemas/SupportedGADShapes'
      required:
      - shape
      title: GADShape
      type: object
    SupportedGADShapes:
      enum:
        - POINT
        - POINT_UNCERTAINTY_CIRCLE
        - POINT_UNCERTAINTY_ELLIPSE
        - POLYGON
        - POINT_ALTITUDE
        - POINT_ALTITUDE_UNCERTAINTY
        - ELLIPSOID_ARC
        - LOCAL_2D_POINT_UNCERTAINTY_ELLIPSE
        - LOCAL_3D_POINT_UNCERTAINTY_ELLIPSOID
        - DISTANCE_DIRECTION
        - RELATIVE_2D_LOCATION_UNCERTAINTY_ELLIPSE
        - RELATIVE_3D_LOCATION_UNCERTAINTY_ELLIPSOID
      type: string
      description: Indicates supported GAD shapes.
      title: SupportedGADShapes
    PointUncertaintyCircle:
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
          uncertainty:
            $ref: '#/components/schemas/Uncertainty'
        required:
        - point
        - uncertainty
        type: object
      description: Ellipsoid point with uncertainty circle.
      title: PointUncertaintyCircle
    GeographicalCoordinates:
      description: Geographical coordinates.
      example:
        lon: 36.988422590534526
        lat: -63.615366350946985
      properties:
        lon:
          format: double
          maximum: 180
          minimum: -180
          title: lon
          type: number
        lat:
          format: double
          maximum: 90
          minimum: -90
          title: lat
          type: number
      required:
      - lat
      - lon
      title: GeographicalCoordinates
      type: object
    Uncertainty:
      description: Indicates value of uncertainty.
      format: float
      minimum: 0
      title: Uncertainty
      type: number
    PointUncertaintyEllipse:
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
          uncertaintyEllipse:
            $ref: '#/components/schemas/UncertaintyEllipse'
          confidence:
            $ref: '#/components/schemas/Confidence'
        required:
        - confidence
        - point
        - uncertaintyEllipse
        type: object
      description: Ellipsoid point with uncertainty ellipse.
      title: PointUncertaintyEllipse
    UncertaintyEllipse:
      description: Ellipse with uncertainty.
      properties:
        semiMajor:
          description: Indicates value of uncertainty.
          format: float
          minimum: 0
          title: Uncertainty
          type: number
        semiMinor:
          description: Indicates value of uncertainty.
          format: float
          minimum: 0
          title: Uncertainty
          type: number
        orientationMajor:
          description: Indicates value of orientation angle.
          maximum: 180
          minimum: 0
          title: Orientation
          type: integer
      required:
      - orientationMajor
      - semiMajor
      - semiMinor
      title: UncertaintyEllipse
      type: object
    Orientation:
      description: Indicates value of orientation angle.
      maximum: 180
      minimum: 0
      title: Orientation
      type: integer
    Confidence:
      description: Indicates value of confidence.
      maximum: 100
      minimum: 0
      type: integer
    Polygon:
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - properties:
          pointList:
            $ref: '#/components/schemas/PointList'
        required:
        - pointList
        type: object
      description: Polygon.
      title: Polygon
    PointList:
      description: List of points.
      items:
        $ref: '#/components/schemas/GeographicalCoordinates'
      maxItems: 15
      minItems: 3
      type: array
    PointAltitude:
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
          altitude:
            $ref: '#/components/schemas/Altitude'
        required:
        - altitude
        - point
        type: object
      description: Ellipsoid point with altitude.
      title: PointAltitude
    Altitude:
      description: Indicates value of altitude.
      format: double
      maximum: 32767
      minimum: -32767
      type: number
    PointAltitudeUncertainty:
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
          altitude:
            $ref: '#/components/schemas/Altitude'
          uncertaintyEllipse:
            $ref: '#/components/schemas/UncertaintyEllipse'
          uncertaintyAltitude:
            $ref: '#/components/schemas/Uncertainty'
          confidence:
            $ref: '#/components/schemas/Confidence'
          vConfidence:
            $ref: '#/components/schemas/Confidence'
        required:
        - altitude
        - confidence
        - point
        - uncertaintyAltitude
        - uncertaintyEllipse
        type: object
      description: Ellipsoid point with altitude and uncertainty ellipsoid.
      title: PointAltitudeUncertainty
    EllipsoidArc:
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
          innerRadius:
            $ref: '#/components/schemas/InnerRadius'
          uncertaintyRadius:
            $ref: '#/components/schemas/Uncertainty'
          offsetAngle:
            $ref: '#/components/schemas/Angle'
          includedAngle:
            $ref: '#/components/schemas/Angle'
          confidence:
            $ref: '#/components/schemas/Confidence'
        required:
        - confidence
        - includedAngle
        - innerRadius
        - offsetAngle
        - point
        - uncertaintyRadius
        type: object
      description: Ellipsoid Arc.
      title: EllipsoidArc
    InnerRadius:
      description: Indicates value of the inner radius.
      format: int32
      maximum: 327675
      minimum: 0
      type: integer
    Angle:
      description: Indicates value of angle.
      maximum: 360
      minimum: 0
      type: integer
    Local2dPointUncertaintyEllipse:
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - properties:
          localOrigin:
            $ref: '#/components/schemas/LocalOrigin'
          point:
            $ref: '#/components/schemas/RelativeCartesianLocation'
          uncertaintyEllipse:
            $ref: '#/components/schemas/UncertaintyEllipse'
          confidence:
            $ref: '#/components/schemas/Confidence'
        required:
        - confidence
        - localOrigin
        - point
        - uncertaintyEllipse
        type: object
      description: Local 2D point with uncertainty ellipse
    LocalOrigin:
      description: Indicates a Local origin in a reference system
      properties:
        coordinateId:
          title: coordinateId
          type: string
        point:
          $ref: '#/components/schemas/GeographicalCoordinates'
        area:
          $ref: '#/components/schemas/GeographicArea'
        horizAxesOrientation:
          description: Horizontal axes orientation angle clockwise from northing in
            0.1 degrees.
          maximum: 3600
          minimum: 0
          title: HorizAxesOrientation
          type: integer
      required:
      - coordinateId
      title: LocalOrigin
      type: object
    HorizAxesOrientation:
      description: Horizontal axes orientation angle clockwise from northing in 0.1
        degrees.
      maximum: 3600
      minimum: 0
      title: HorizAxesOrientation
      type: integer
    RelativeCartesianLocation:
      description: Relative Cartesian Location
      properties:
        x:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: Float
          type: number
        "y":
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: Float
          type: number
        z:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: Float
          type: number
      required:
      - x
      - "y"
      title: RelativeCartesianLocation
      type: object
    Local3dPointUncertaintyEllipsoid:
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - properties:
          localOrigin:
            $ref: '#/components/schemas/LocalOrigin'
          point:
            $ref: '#/components/schemas/RelativeCartesianLocation'
          uncertaintyEllipsoid:
            $ref: '#/components/schemas/UncertaintyEllipsoid'
          confidence:
            $ref: '#/components/schemas/Confidence'
          vConfidence:
            $ref: '#/components/schemas/Confidence'
        required:
        - confidence
        - localOrigin
        - point
        - uncertaintyEllipsoid
        type: object
      description: Local 3D point with uncertainty ellipsoid
    UncertaintyEllipsoid:
      description: Ellipsoid with uncertainty
      properties:
        semiMajor:
          description: Indicates value of uncertainty.
          format: float
          minimum: 0
          title: Uncertainty
          type: number
        semiMinor:
          description: Indicates value of uncertainty.
          format: float
          minimum: 0
          title: Uncertainty
          type: number
        vertical:
          description: Indicates value of uncertainty.
          format: float
          minimum: 0
          title: Uncertainty
          type: number
        orientationMajor:
          description: Indicates value of orientation angle.
          maximum: 180
          minimum: 0
          title: Orientation
          type: integer
      required:
      - orientationMajor
      - semiMajor
      - semiMinor
      - vertical
      title: UncertaintyEllipsoid
      type: object
    Uinteger:
      description: "Unsigned Integer, i.e. only value 0 and integers above 0 are permissible."
      minimum: 0
      title: Uinteger
      type: integer
    DurationSec:
      description: Unsigned integer identifying a period of time in units of seconds.
      minimum: 0
      title: DurationSec
      type: integer
    Ipv4AddressRange_1:
      description: Range of IPv4 addresses
      example:
        start: 198.51.100.1
        end: 198.51.100.1
      properties:
        start:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
        end:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
      required:
      - end
      - start
      title: Ipv4AddressRange_1
      type: object
    Ipv6AddressRange_1:
      description: Range of IPv6 addresses
      example:
        start: 2001:db8:85a3::8a2e:370:7334
        end: 2001:db8:85a3::8a2e:370:7334
      properties:
        start:
          $ref: '#/components/schemas/Ipv6Addr_1'
        end:
          $ref: '#/components/schemas/Ipv6Addr_1'
      required:
      - end
      - start
      title: Ipv6AddressRange_1
      type: object
    Ipv6Addr_1:
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
      example: 2001:db8:85a3::8a2e:370:7334
      title: Ipv6Addr_1
      type: string
    Float:
      description: string with format 'float' as defined in OpenAPI.
      format: float
      title: Float
      type: number
