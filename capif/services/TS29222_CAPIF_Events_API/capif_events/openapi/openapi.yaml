          supportedApiVersions:
          - supportedApiVersions
          - supportedApiVersions
        - apiName: apiName
          supportedApiVersions:
          - supportedApiVersions
          - supportedApiVersions
        serviceAPICategories:
        - serviceAPICategories
        - serviceAPICategories
      nullable: true
      properties:
        aefIds:
          items:
            type: string
          minItems: 1
          title: aefIds
          type: array
        apis:
          items:
            $ref: '#/components/schemas/ApiInfo'
          minItems: 1
          title: apis
          type: array
        serviceAPICategories:
          items:
            type: string
          minItems: 1
          title: serviceAPICategories
          type: array
      title: RelatedCriteria
      type: object
    ApiInfo:
      description: Represents service API identification related information.
      example:
        apiName: apiName
        supportedApiVersions:
        - supportedApiVersions
        - supportedApiVersions
      properties:
        apiName:
          title: apiName
          type: string
        supportedApiVersions:
          items:
            type: string
          minItems: 1
          title: supportedApiVersions
          type: array
      required:
      - apiName
      title: ApiInfo
      type: object
    AccessControlPolicyList:
      description: Represents the access control policy list for a published service
        API.
      properties:
        apiInvokerPolicies:
          description: Policy of each API invoker.
          items:
            $ref: '#/components/schemas/ApiInvokerPolicy'
          minItems: 0
          title: apiInvokerPolicies
          type: array
      title: AccessControlPolicyList
      type: object
    ApiInvokerPolicy:
      description: Represents the policy of an API Invoker.
      example:
        apiInvokerId: apiInvokerId
        allowedTotalInvocations: 3
        netSliceInfo:
        - ensi: ensi
          snssai:
            sd: sd
            sst: 237
          nsiId: nsiId
        - ensi: ensi
          snssai:
            sd: sd
            sst: 237
          nsiId: nsiId
        allowedInvocationTimeRangeList:
        - startTime: 2000-01-23T04:56:07.000+00:00
          stopTime: 2000-01-23T04:56:07.000+00:00
        - startTime: 2000-01-23T04:56:07.000+00:00
          stopTime: 2000-01-23T04:56:07.000+00:00
        allowedInvocationsPerSecond: 2
