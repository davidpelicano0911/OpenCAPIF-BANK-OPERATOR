            - supportedApiVersions
          - apiName: apiName
            supportedApiVersions:
            - supportedApiVersions
            - supportedApiVersions
          serviceAPICategories:
          - serviceAPICategories
          - serviceAPICategories
        secMethods:
        - null
        - null
      properties:
        secMethods:
          items:
