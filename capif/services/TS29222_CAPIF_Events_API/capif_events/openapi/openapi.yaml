            Relative URI of the API resource, it is set as {apiSpecificSuffixes} part of the URI structure as defined in clause 5.2.4 of 3GPP TS 29.122.
          title: uri
          type: string
        custOpName:
          description: |
            it is set as {custOpName} part of the URI structure for a custom operation associated with a resource as defined in clause 5.2.4 of 3GPP TS 29.122.
          title: custOpName
          type: string
        custOperations:
          description: |
            Custom operations associated with this resource.
          items:
            $ref: '#/components/schemas/CustomOperation'
          minItems: 1
          title: custOperations
          type: array
        operations:
          description: |
            Supported HTTP methods for the API resource. Only applicable when the protocol in AefProfile indicates HTTP.
          items:
            $ref: '#/components/schemas/Operation'
          minItems: 1
          title: operations
          type: array
        description:
          description: Text description of the API resource
          title: description
          type: string
      required:
      - commType
      - resourceName
      - uri
      title: Resource
      type: object
    CommunicationType:
      enum:
        - REQUEST_RESPONSE
        - SUBSCRIBE_NOTIFY
      type: string
      description: "Indicates a communication type of the resource or the custom operation.\
        \  \nPossible values are:\n- REQUEST_RESPONSE: The communication is of the\
        \ type request-response.\n- SUBSCRIBE_NOTIFY: The communication is of the\
        \ type subscribe-notify.\n"
      title: CommunicationType
    CustomOperation:
      description: Represents the description of a custom operation.
      example:
        operations:
        - GET
        - GET
        commType: null
        description: description
        custOpName: custOpName
      properties:
        commType:
          $ref: '#/components/schemas/CommunicationType'
        custOpName:
          description: |
            it is set as {custOpName} part of the URI structure for a custom operation without resource association as defined in clause 5.2.4 of 3GPP TS 29.122.
          title: custOpName
          type: string
        operations:
          description: |
            Supported HTTP methods for the API resource. Only applicable when the protocol in AefProfile indicates HTTP.
          items:
            $ref: '#/components/schemas/Operation'
          minItems: 1
          title: operations
          type: array
        description:
          description: Text description of the custom operation
          title: description
          type: string
      required:
      - commType
      - custOpName
      title: CustomOperation
      type: object
    Operation:
      enum:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      type: string
      description: "Indicates an HTTP method.  \nPossible values are:\n- GET: HTTP\
        \ GET method.\n- POST: HTTP POST method.\n- PUT: HTTP PUT method.\n- PATCH:\
        \ HTTP PATCH method.\n- DELETE: HTTP DELETE method.\n"
      title: Operation
    Protocol:
      enum:
        - HTTP_1_1
        - HTTP_2
        - MQTT
        - WEBSOCKET
      type: string
      description: "Indicates a protocol and protocol version used by the API.  \n\
        Possible values are:\n- HTTP_1_1: Indicates that the protocol is HTTP version\
        \ 1.1.\n- HTTP_2: Indicates that the protocol is HTTP version 2.\n- MQTT:\
        \ Indicates that the protocol is Message Queuing Telemetry Transport.\n- WEBSOCKET:\
        \ Indicates that the protocol is Websocket.\n"
      title: Protocol
    DataFormat:
      enum:
        - JSON
        - XML
        - PROTOBUF3
      type: string
      description: "Indicates a data format.  \nPossible values are:\n- JSON: Indicates\
        \ that the data format is JSON.\n- XML: Indicates that the data format is\
        \ Extensible Markup Language.\n- PROTOBUF3: Indicates that the data format\
        \ is Protocol buffers version 3.\n"
      title: DataFormat
    SecurityMethod:
      enum:
        - PSK
        - PKI
        - OAUTH
      type: string
      description: "Indicates the security method.  \nPossible values are:\n- PSK:\
        \ Security method 1 (Using TLS-PSK) as described in 3GPP TS 33.122.\n- PKI:\
        \ Security method 2 (Using PKI) as described in 3GPP TS 33.122.\n- OAUTH:\
        \ Security method 3 (TLS with OAuth token) as described in 3GPP TS 33.122.\n"
      title: SecurityMethod
    InterfaceDescription:
      description: Represents the description of an API's interface.
      example:
        ipv6Addr: ipv6Addr
        grantTypes:
        - null
        - null
        securityMethods:
        - null
        - null
        fqdn: fqdn
        port: 5248
        apiPrefix: apiPrefix
        ipv4Addr: ipv4Addr
      nullable: true
      oneOf: 
        - required: ["fqdn"]
        - required: ["ipv4Addr"]
        - required: ["ipv6Addr"]
      properties:
        ipv4Addr:
          description: |
            string identifying a Ipv4 address formatted in the "dotted decimal" notation as defined in IETF RFC 1166.
          title: Ipv4Addr
          type: string
        ipv6Addr:
          description: |
            string identifying a Ipv6 address formatted according to clause 4 in IETF RFC 5952. The mixed Ipv4 Ipv6 notation according to clause 5 of IETF RFC 5952 shall not be used.
          title: Ipv6Addr
          type: string
        fqdn:
          description: Fully Qualified Domain Name
          maxLength: 253
          minLength: 4
          pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
            .?$"
          title: Fqdn
          type: string
        port:
          description: Unsigned integer with valid values between 0 and 65535.
          maximum: 65535
          minimum: 0
          title: Port
          type: integer
        apiPrefix:
          description: |
            A string representing a sequence of path segments that starts with the slash character.
          title: apiPrefix
          type: string
        securityMethods:
          description: |
            Security methods supported by the interface, it take precedence over the security methods provided in AefProfile, for this specific interface.
          items:
            $ref: '#/components/schemas/SecurityMethod'
          minItems: 1
          title: securityMethods
          type: array
        grantTypes:
          items:
            $ref: '#/components/schemas/OAuthGrantType'
          minItems: 1
          title: grantTypes
          type: array
      title: InterfaceDescription
      type: object
    AefLocation:
      description: |
        Represents the location information (e.g. civic address, GPS coordinates, data center ID) where the AEF providing the service API is located.
      example:
        dcId: dcId
        geoArea:
          shape: POINT
          point:
            lon: 36.988422590534526
            lat: -63.615366350946985
        civicAddr:
          POBOX: POBOX
          usageRules: usageRules
          country: country
          PRD: PRD
          PLC: PLC
          HNO: HNO
          PRM: PRM
          HNS: HNS
          FLR: FLR
          A1: A1
          A2: A2
          A3: A3
          A4: A4
          STS: STS
          A5: A5
          A6: A6
          RDSEC: RDSEC
          providedBy: providedBy
          LOC: LOC
          UNIT: UNIT
          SEAT: SEAT
          POD: POD
          RDBR: RDBR
          method: method
          LMK: LMK
          POM: POM
          ADDCODE: ADDCODE
          RD: RD
          PC: PC
          PCN: PCN
          NAM: NAM
          BLD: BLD
          ROOM: ROOM
          RDSUBBR: RDSUBBR
      properties:
        civicAddr:
          $ref: '#/components/schemas/CivicAddress'
        geoArea:
          $ref: '#/components/schemas/GeographicArea'
        dcId:
          description: |
            Identifies the data center where the AEF providing the service API is located.
          title: dcId
          type: string
      title: AefLocation
      type: object
    ServiceKpis:
      description: |
        Represents information about the service characteristics provided by a service API.
      example:
        avalMem: avalMem
        avalStor: avalStor
        avalComp: avalComp
        conBand: 0
        maxRestime: 0
        availability: 0
        maxReqRate: 0
        avalGraComp: avalGraComp
      properties:
        maxReqRate:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        maxRestime:
          description: Unsigned integer identifying a period of time in units of seconds.
          minimum: 0
          title: DurationSec_1
          type: integer
        availability:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        avalComp:
          description: |
            The maximum compute resource available in FLOPS for the API Invoker.
          pattern: ^\d+(\.\d+)? (kFLOPS|MFLOPS|GFLOPS|TFLOPS|PFLOPS|EFLOPS|ZFLOPS)$
          title: avalComp
          type: string
        avalGraComp:
          description: |
            The maximum graphical compute resource in FLOPS available for the API Invoker.
          pattern: ^\d+(\.\d+)? (kFLOPS|MFLOPS|GFLOPS|TFLOPS|PFLOPS|EFLOPS|ZFLOPS)$
          title: avalGraComp
          type: string
        avalMem:
          description: |
            The maximum memory resource available for the API Invoker.
          pattern: ^\d+(\.\d+)? (KB|MB|GB|TB|PB|EB|ZB|YB)$
          title: avalMem
          type: string
        avalStor:
          description: |
            The maximum storage resource available for the API Invoker.
          pattern: ^\d+(\.\d+)? (KB|MB|GB|TB|PB|EB|ZB|YB)$
          title: avalStor
          type: string
        conBand:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
      title: ServiceKpis
      type: object
    IpAddrRange:
      anyOf:
        - required: ["ueIpv4AddrRanges"]
        - required: ["ueIpv6AddrRanges"]
      description: Represents the list of public IP ranges
      example:
        ueIpv4AddrRanges:
        - start: 198.51.100.1
          end: 198.51.100.1
        - start: 198.51.100.1
          end: 198.51.100.1
        ueIpv6AddrRanges:
        - start: 2001:db8:85a3::8a2e:370:7334
          end: 2001:db8:85a3::8a2e:370:7334
        - start: 2001:db8:85a3::8a2e:370:7334
          end: 2001:db8:85a3::8a2e:370:7334
      nullable: true
      properties:
        ueIpv4AddrRanges:
          description: Represents the IPv4 Address ranges of the UE(s).
          items:
            $ref: '#/components/schemas/Ipv4AddressRange'
          minItems: 1
          title: ueIpv4AddrRanges
          type: array
        ueIpv6AddrRanges:
          description: Represents the Ipv6 Address ranges of the UE(s).
          items:
            $ref: '#/components/schemas/Ipv6AddressRange_1'
          minItems: 1
          title: ueIpv6AddrRanges
          type: array
      title: IpAddrRange
      type: object
    ShareableInformation:
      description: |
        Indicates whether the service API and/or the service API category can be shared to the list of CAPIF provider domains.
      example:
        capifProvDoms:
        - capifProvDoms
        - capifProvDoms
        isShareable: true
      properties:
        isShareable:
          description: |
            Indicates whether the service API and/or the service API category can be shared to the list of CAPIF provider domain information. true indicates that the service API and/or the service API category can be shared to the list of CAPIF provider domain information. false indicates that the service API and/or the service API category can not be shared to the list of CAPIF provider domain information.
          title: isShareable
          type: boolean
        capifProvDoms:
          description: |
            List of CAPIF provider domains to which the service API information to be shared.
          items:
            type: string
          minItems: 1
          title: capifProvDoms
          type: array
      required:
      - isShareable
      title: ShareableInformation
      type: object
    PublishedApiPath:
      description: Represents the published API path within the same CAPIF provider
        domain.
      example:
        ccfIds:
        - ccfIds
        - ccfIds
      properties:
        ccfIds:
          description: A list of CCF identifiers where the service API is already
            published.
          items:
            type: string
          minItems: 1
          title: ccfIds
          type: array
      title: PublishedApiPath
      type: object
    InvocationLog:
      description: |
        Represents a set of Service API invocation logs to be stored in a CAPIF core function.
      example:
        supportedFeatures: supportedFeatures
        apiInvokerId: apiInvokerId
        aefId: aefId
        logs:
        - apiName: apiName
          invocationTime: 2000-01-23T04:56:07.000+00:00
          srcInterface:
            ipv6Addr: ipv6Addr
            grantTypes:
            - null
            - null
            securityMethods:
            - null
            - null
            fqdn: fqdn
            port: 5248
            apiPrefix: apiPrefix
            ipv4Addr: ipv4Addr
          fwdInterface: fwdInterface
          resourceName: resourceName
          uri: uri
          inputParameters: ""
          invocationLatency: 0
          result: result
          protocol: null
          apiVersion: apiVersion
          netSliceInfo:
            ensi: ensi
            snssai:
              sd: sd
              sst: 237
            nsiId: nsiId
          destInterface:
            ipv6Addr: ipv6Addr
            grantTypes:
            - null
            - null
            securityMethods:
            - null
            - null
            fqdn: fqdn
            port: 5248
            apiPrefix: apiPrefix
            ipv4Addr: ipv4Addr
          operation: null
          apiId: apiId
          outputParameters: ""
        - apiName: apiName
          invocationTime: 2000-01-23T04:56:07.000+00:00
          srcInterface:
            ipv6Addr: ipv6Addr
            grantTypes:
            - null
            - null
            securityMethods:
            - null
            - null
            fqdn: fqdn
            port: 5248
            apiPrefix: apiPrefix
            ipv4Addr: ipv4Addr
          fwdInterface: fwdInterface
          resourceName: resourceName
          uri: uri
          inputParameters: ""
          invocationLatency: 0
          result: result
          protocol: null
          apiVersion: apiVersion
          netSliceInfo:
            ensi: ensi
            snssai:
              sd: sd
              sst: 237
            nsiId: nsiId
          destInterface:
            ipv6Addr: ipv6Addr
            grantTypes:
            - null
            - null
            securityMethods:
            - null
            - null
            fqdn: fqdn
            port: 5248
            apiPrefix: apiPrefix
            ipv4Addr: ipv4Addr
          operation: null
          apiId: apiId
          outputParameters: ""
      properties:
        aefId:
          description: |
            Identity information of the API exposing function requesting logging of service API invocations
          title: aefId
          type: string
        apiInvokerId:
          description: Identity of the API invoker which invoked the service API
          title: apiInvokerId
          type: string
        logs:
          description: Service API invocation log
          items:
            $ref: '#/components/schemas/Log'
          minItems: 1
          title: logs
          type: array
        supportedFeatures:
          description: |
            A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
          pattern: "^[A-Fa-f0-9]*$"
          title: SupportedFeatures
          type: string
      required:
      - aefId
      - apiInvokerId
      - logs
      title: InvocationLog
      type: object
    Log:
      description: Represents an individual service API invocation log entry.
      example:
        apiName: apiName
        invocationTime: 2000-01-23T04:56:07.000+00:00
        srcInterface:
          ipv6Addr: ipv6Addr
          grantTypes:
          - null
          - null
          securityMethods:
          - null
          - null
          fqdn: fqdn
          port: 5248
          apiPrefix: apiPrefix
          ipv4Addr: ipv4Addr
        fwdInterface: fwdInterface
        resourceName: resourceName
        uri: uri
        inputParameters: ""
        invocationLatency: 0
        result: result
        protocol: null
        apiVersion: apiVersion
        netSliceInfo:
          ensi: ensi
          snssai:
            sd: sd
            sst: 237
          nsiId: nsiId
        destInterface:
          ipv6Addr: ipv6Addr
          grantTypes:
          - null
          - null
          securityMethods:
          - null
          - null
          fqdn: fqdn
          port: 5248
          apiPrefix: apiPrefix
          ipv4Addr: ipv4Addr
        operation: null
        apiId: apiId
        outputParameters: ""
      properties:
        apiId:
          description: String identifying the API invoked.
          title: apiId
          type: string
        apiName:
          description: |
            Contains the invoked API name set to the value of the "<apiName>" placeholder of the API URI as defined in clause 5.2.4 of 3GPP TS 29.122 [14].
          title: apiName
          type: string
        apiVersion:
          description: Version of the API which was invoked
          title: apiVersion
          type: string
        resourceName:
          description: Name of the specific resource invoked
          title: resourceName
          type: string
        uri:
          description: string providing an URI formatted according to IETF RFC 3986.
          title: Uri
          type: string
        protocol:
          $ref: '#/components/schemas/Protocol'
        operation:
          $ref: '#/components/schemas/Operation'
        result:
          description: "For HTTP protocol, it contains HTTP status code of the invocation"
          title: result
          type: string
        invocationTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime_1
          type: string
        invocationLatency:
          description: Represents a period of time in units of milliseconds.
          minimum: 0
          title: DurationMs
          type: integer
        inputParameters:
          description: |
            List of input parameters. Can be any value - string, number, boolean, array or object.
          title: inputParameters
        outputParameters:
          description: |
            List of output parameters. Can be any value - string, number, boolean, array or object.
          title: outputParameters
        srcInterface:
          $ref: '#/components/schemas/InterfaceDescription'
        destInterface:
          $ref: '#/components/schemas/InterfaceDescription'
        fwdInterface:
          description: |
            It includes the node identifier (as defined in IETF RFC 7239 of all forwarding entities between the API invoker and the AEF, concatenated with comma and space, e.g. 192.0.2.43:80, unknown:_OBFport, 203.0.113.60
          title: fwdInterface
          type: string
        netSliceInfo:
          $ref: '#/components/schemas/NetSliceId'
      required:
      - apiId
      - apiName
      - apiVersion
      - protocol
      - resourceName
      - result
      title: Log
      type: object
    DurationMs:
      description: Represents a period of time in units of milliseconds.
      minimum: 0
      title: DurationMs
      type: integer
    OnboardingCriteria:
