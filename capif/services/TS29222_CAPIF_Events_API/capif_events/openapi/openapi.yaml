          type: array
        netSliceInfo:
          items:
            $ref: '#/components/schemas/NetSliceId'
          minItems: 1
          title: netSliceInfo
          type: array
      required:
      - apiInvokerId
      title: ApiInvokerPolicy
      type: object
    TimeRangeList:
      description: |
        Represents the time range during which the invocation of a service API is allowed by the API invoker.
      example:
        startTime: 2000-01-23T04:56:07.000+00:00
        stopTime: 2000-01-23T04:56:07.000+00:00
      properties:
        startTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime_1
          type: string
        stopTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime_1
          type: string
      title: TimeRangeList
      type: object
    RoutingRule:
      description: Represents an API routing rule.
      example:
        ipv6AddrRanges:
        - start: start
          end: end
        - start: start
          end: end
        aefProfile:
          protocol: HTTP_1_1
          grantTypes:
          - CLIENT_CREDENTIALS
          - CLIENT_CREDENTIALS
          ueIpRange:
            ueIpv4AddrRanges:
            - start: 198.51.100.1
              end: 198.51.100.1
            - start: 198.51.100.1
              end: 198.51.100.1
            ueIpv6AddrRanges:
            - start: 2001:db8:85a3::8a2e:370:7334
              end: 2001:db8:85a3::8a2e:370:7334
            - start: 2001:db8:85a3::8a2e:370:7334
              end: 2001:db8:85a3::8a2e:370:7334
          securityMethods:
          - PSK
          - PSK
          versions:
          - apiVersion: apiVersion
            resources:
            - operations:
              - null
              - null
              commType: REQUEST_RESPONSE
              custOperations:
              - operations:
                - GET
                - GET
                commType: null
                description: description
                custOpName: custOpName
              - operations:
