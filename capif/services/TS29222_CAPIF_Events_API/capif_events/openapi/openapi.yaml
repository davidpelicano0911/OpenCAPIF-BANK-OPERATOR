    CAPIFEvent:
      enum:
        - SERVICE_API_AVAILABLE
        - SERVICE_API_UNAVAILABLE
        - SERVICE_API_UPDATE
        - API_INVOKER_ONBOARDED
        - API_INVOKER_OFFBOARDED
        - SERVICE_API_INVOCATION_SUCCESS
        - SERVICE_API_INVOCATION_FAILURE
        - ACCESS_CONTROL_POLICY_UPDATE
        - ACCESS_CONTROL_POLICY_UNAVAILABLE
        - API_INVOKER_AUTHORIZATION_REVOKED
        - API_INVOKER_UPDATED
        - API_TOPOLOGY_HIDING_CREATED
        - API_TOPOLOGY_HIDING_REVOKED
        - API_INVOKER_ONBOARDING_CRITERIA_FAILED
        - SERVICE_API_ONBOARDED_BY_API_INVOKERS_COUNT
        - SERVICE_API_DISCOVERY_BY_API_INVOKERS_COUNT
      type: string
      description: "Describes the CAPIF event.  \nPossible values are:\n- SERVICE_API_AVAILABLE:\n\
        \  Events related to the availability of service APIs after the service APIs\
        \ are\n  published.\n- SERVICE_API_UNAVAILABLE:\n  Events related to the unavailability\
        \ of service APIs after the service APIs are\n  unpublished.\n- SERVICE_API_UPDATE:\
        \ Events related to change in service API information.\n- API_INVOKER_ONBOARDED:\
        \ Events related to API invoker onboarded to CAPIF.\n- API_INVOKER_OFFBOARDED:\
        \ Events related to API invoker offboarded from CAPIF.\n- SERVICE_API_INVOCATION_SUCCESS:\n\
        \  Events related to the successful invocation of service APIs.\n- SERVICE_API_INVOCATION_FAILURE:\
        \ Events related to the failed invocation of service APIs.\n- ACCESS_CONTROL_POLICY_UPDATE:\n\
        \  Events related to the update for the access control policy related to the\
        \ service APIs.\n- ACCESS_CONTROL_POLICY_UNAVAILABLE:\n  Events related to\
        \ the unavailability of the access control policy related to\n  the service\
        \ APIs.\n- API_INVOKER_AUTHORIZATION_REVOKED: Events related to the revocation\
        \ of the authorization\n  of API invokers to access the service APIs.\n- API_INVOKER_UPDATED:\
        \ Events related to API invoker profile updated to CAPIF.\n- API_TOPOLOGY_HIDING_CREATED:\n\
        \  Events related to the creation or update of the API topology hiding\n \
        \ information of the service APIs after the service APIs are published.\n\
        - API_TOPOLOGY_HIDING_REVOKED:\n  Events related to the revocation of the\
        \ API topology hiding information of\n  the service APIs after the service\
        \ APIs are unpublished.\n- API_INVOKER_ONBOARDING_CRITERIA_FAILED: Events\
        \ related to API Invoker onboarding criteria\n  failed to be met. \n- SERVICE_API_ONBOARDED_BY_API_INVOKERS_COUNT:\
        \ Periodic event related to the number of times the\n  API Invokers requested\
        \ to onboard the targeted service API(s).\n- SERVICE_API_DISCOVERY_BY_API_INVOKERS_COUNT:\
        \ Periodic event related to the number of times the\n  API Invokers discovered\
        \ the targeted service API(s).\n"
      title: CAPIFEvent
    ProblemDetails:
      description: Represents additional information and details on an error response.
      properties:
        type:
          description: string providing an URI formatted according to IETF RFC 3986.
          title: Uri
          type: string
        title:
          description: "A short, human-readable summary of the problem type. It should\
            \ not change from occurrence to occurrence of the problem. \n"
          title: title
          type: string
        status:
          description: The HTTP status code for this occurrence of the problem.
          title: status
          type: integer
        detail:
          description: A human-readable explanation specific to this occurrence of
            the problem.
          title: detail
          type: string
        instance:
          description: string providing an URI formatted according to IETF RFC 3986.
          title: Uri
          type: string
        cause:
          description: |
            A machine-readable application error cause specific to this occurrence of the problem. This IE should be present and provide application-related error information, if available.
          title: cause
          type: string
        invalidParams:
          description: |
            Description of invalid parameters, for a request rejected due to invalid parameters.
          items:
            $ref: '#/components/schemas/InvalidParam'
          minItems: 1
          title: invalidParams
          type: array
        supportedFeatures:
          description: |
            A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
          pattern: "^[A-Fa-f0-9]*$"
          title: SupportedFeatures
          type: string
      title: ProblemDetails
      type: object
