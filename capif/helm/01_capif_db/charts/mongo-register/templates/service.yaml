apiVersion: v1
kind: Service
metadata:
  name: mongo-register
  labels:
    {{- include "mongo-register.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "mongo-register.selectorLabels" . | nindent 4 }}
