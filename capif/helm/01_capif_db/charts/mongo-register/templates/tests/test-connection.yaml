apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mongo-register.fullname" . }}-test-connection"
  labels:
    {{- include "mongo-register.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['mongo-register:{{ .Values.service.port }}']
  restartPolicy: Never
