apiVersion: v1
kind: Service
metadata:
  name: register
  labels:
    {{- include "ocf-register.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "ocf-register.selectorLabels" . | nindent 4 }}
