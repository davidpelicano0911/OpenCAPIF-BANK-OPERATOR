# Default values for ocf-register.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: register
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

env:
  mongoHost: mongo-register
  mongoPort: 27017
  vaultHostname: vault
  vaultPort: 8200
  vaultAccessToken: dev-only-token
  capifHostname: capif-test.example.int
  registerHostname: register
  logLevel: "INFO"
  timeout: "30"

capifConfiguration:
  config_name: "default"
  config_version: "1.0"
  config_description: "Default Register Configuration"
  settings:
    certificates_expiry:
      ttl_superadmin_cert: "4300h"
  
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

extraConfigPod: {}
#  hostAliases:
#  - hostnames:
#    - "www.example.com"
#    ip: "1.2.3.4"

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8084

ingress:
  enabled: true
  className: "nginx"
  annotations:
    #cert-manager.io/issuer: letsencrypt-issuer
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"   
  hosts:
    - host: register.app.ocp-epg.hi.inet
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 1m
    memory: 1Mi

livenessProbe:
#  httpGet:
#    path: /
#    port: http
readinessProbe:
  tcpSocket:
    port: 8080

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
 - name: register-configmap
   configMap:
     name: register-configmap
     items:
     - key: "config.yaml"
       path: "config.yaml"


# Additional volumeMounts on the output Deployment definition.
volumeMounts:
 - name: register-configmap
   mountPath: /usr/src/app/config.yaml
   subPath: config.yaml

nodeSelector: {}

tolerations: []

affinity: {}
