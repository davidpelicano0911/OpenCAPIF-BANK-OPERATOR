{{- if .Values.enabled | default false }}
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    {{- include "loki.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "loki.selectorLabels" . | nindent 4 }}
{{- end }}
