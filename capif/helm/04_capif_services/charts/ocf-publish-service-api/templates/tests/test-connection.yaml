apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ocf-publish-service-api.fullname" . }}-test-connection"
  labels:
    {{- include "ocf-publish-service-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['published-apis:{{ .Values.service.port }}']
  restartPolicy: Never
