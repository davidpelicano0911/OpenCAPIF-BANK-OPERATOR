apiVersion: v1
kind: Service
metadata:
  name: api-provider-management
  labels:
    {{- include "ocf-api-provider-management.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ocf-api-provider-management.selectorLabels" . | nindent 4 }}
