apiVersion: v1
kind: Pod
metadata:
  name: "test-connection"
  labels:
    {{- include "nginx.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
  {{- range .Values.service.ports }}
    - name: wget-{{ .name }}
      image: busybox
      command: ['wget']
      args: ['nginx:{{ .port }}']
  {{- end }}
  restartPolicy: Never
