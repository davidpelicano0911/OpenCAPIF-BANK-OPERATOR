apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ocf-api-invoker-management.fullname" . }}-test-connection"
  labels:
    {{- include "ocf-api-invoker-management.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['api-invoker-management:{{ .Values.service.port }}']
  restartPolicy: Never
