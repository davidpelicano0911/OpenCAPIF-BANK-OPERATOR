apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ocf-auditing-api-logs.fullname" . }}-test-connection"
  labels:
    {{- include "ocf-auditing-api-logs.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['logs:{{ .Values.service.port }}']
  restartPolicy: Never
