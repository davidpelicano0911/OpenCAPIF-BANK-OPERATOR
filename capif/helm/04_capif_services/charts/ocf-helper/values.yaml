# Default values for ocf-helper.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: "ocf-helper"
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

env:
  vaultHostname: vault-internal.mon.svc.cluster.local
  vaultPort: 8200
  vaultAccessToken: dev-only-token
  mongoHost: mongo
  mongoPort: 27017
  capifHostname: capif
  mongoInitdbRootUsername: root
  mongoInitdbRootPassword: example
  logLevel: "INFO"

capifConfiguration:
  config_name: "default"
  config_version: "1.0"
  config_description: "Default CAPIF Configuration"
  settings:
    certificates_expiry:
      ttl_superadmin_cert: "4300h"
      ttl_invoker_cert: "4300h"
      ttl_provider_cert: "4300h"
    security_method_priority:
      oauth: 1
      pki: 2
      psk: 3
    acl_policy_settings:
      allowed_total_invocations: 5
      allowed_invocations_per_second: 10
      allowed_invocation_time_range_days: 365

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  app: ocf-ocf-helper

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 1m
    memory: 1Mi

livenessProbe:
  tcpSocket:
    port: 8080
readinessProbe:
  tcpSocket:
    port: 8080

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
 - name: ocf-helper-configmap
   configMap:
    name: ocf-helper-configmap
    items:
    - key: "config.yaml"
      path: "config.yaml"

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
 - name: ocf-helper-configmap
   mountPath: /usr/src/app/config.yaml
   subPath: config.yaml

nodeSelector: {}

tolerations: []

affinity: {}
