apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ocf-access-control-policy.fullname" . }}-test-connection"
  labels:
    {{- include "ocf-access-control-policy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['access-control-policy:{{ .Values.service.port }}']
  restartPolicy: Never
