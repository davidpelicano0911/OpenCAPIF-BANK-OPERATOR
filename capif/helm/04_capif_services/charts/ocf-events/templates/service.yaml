apiVersion: v1
kind: Service
metadata:
  name: capif-events
  labels:
    {{- include "ocf-events.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ocf-events.selectorLabels" . | nindent 4 }}
