{{- if .Values.enabled | default false }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mongo-register-express.fullname" . }}-test-connection"
  labels:
    {{- include "mongo-register-express.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['mongo-register-express:{{ .Values.service.port }}']
  restartPolicy: Never
{{- end }}