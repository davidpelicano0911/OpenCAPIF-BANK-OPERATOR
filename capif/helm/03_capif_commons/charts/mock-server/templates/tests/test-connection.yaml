{{- if .Values.enabled | default false }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mock-server.fullname" . }}-test-connection"
  labels:
    {{- include "mock-server.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['mock-server:{{ .Values.service.port }}']
  restartPolicy: Never
{{- end }}